syntax = "proto3";

package continuity.v1;

import "continuity/v1/common.proto";

option java_multiple_files = true;
option java_package = "com.androidcontinuity.proto";
option java_outer_classname = "TransferProto";
option swift_prefix = "AC";

service TransferService {
  rpc InitiateTransfer(TransferRequest) returns (TransferResponse);
  rpc SendFile(stream FileChunk) returns (FileReceipt);
  rpc GetTransferStatus(TransferStatusRequest) returns (TransferStatusResponse);
  rpc CancelTransfer(CancelTransferRequest) returns (CancelTransferResponse);
}

message TransferRequest {
  string session_token = 1;
  string sender_device_id = 2;
  repeated FileMetadata files = 3;
  TransferDirection direction = 4;
}

enum TransferDirection {
  TRANSFER_DIRECTION_UNSPECIFIED = 0;
  TRANSFER_DIRECTION_ANDROID_TO_MACOS = 1;
  TRANSFER_DIRECTION_MACOS_TO_ANDROID = 2;
}

message TransferResponse {
  StatusCode status = 1;
  string transfer_id = 2;
  repeated FileAcceptance file_acceptances = 3;
  string message = 4;
}

message FileAcceptance {
  string file_id = 1;
  bool accepted = 2;
  string rejection_reason = 3;
}

message FileChunk {
  string transfer_id = 1;
  string file_id = 2;
  uint32 chunk_index = 3;
  bytes data = 4;
  bool is_last_chunk = 5;
  uint32 total_chunks = 6;
}

message FileReceipt {
  string transfer_id = 1;
  string file_id = 2;
  StatusCode status = 3;
  int64 bytes_received = 4;
  bool checksum_verified = 5;
  string message = 6;
}

message TransferStatusRequest {
  string transfer_id = 1;
}

message TransferStatusResponse {
  string transfer_id = 1;
  TransferState state = 2;
  repeated FileProgress file_progress = 3;
  string message = 4;
}

enum TransferState {
  TRANSFER_STATE_UNSPECIFIED = 0;
  TRANSFER_STATE_PENDING = 1;
  TRANSFER_STATE_IN_PROGRESS = 2;
  TRANSFER_STATE_COMPLETED = 3;
  TRANSFER_STATE_FAILED = 4;
  TRANSFER_STATE_CANCELLED = 5;
}

message FileProgress {
  string file_id = 1;
  int64 bytes_transferred = 2;
  int64 total_bytes = 3;
  TransferState state = 4;
}

message CancelTransferRequest {
  string transfer_id = 1;
  string reason = 2;
}

message CancelTransferResponse {
  StatusCode status = 1;
}
